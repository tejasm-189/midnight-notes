<body class="bg-surface-container-lowest text-on-surface h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Suppressed TopAppBar and SideNavBar as this is a transactional/entry screen per Shared Components Logic -->
<main class="w-full max-w-md px-margin-mobile md:px-margin-desktop flex flex-col items-center z-10">
<!-- Branding Section -->
<div class="flex flex-col items-center mb-xl text-center">
<span class="material-symbols-outlined text-primary-fixed-dim text-[48px] mb-sm" style="font-variation-settings: 'FILL' 1;">
                lock
            </span>
<h1 class="font-display text-display text-primary-fixed-dim tracking-tight">Midnight Notes</h1>
<p class="font-label-mono text-label-mono text-on-surface-variant mt-xs flex items-center justify-center gap-xs">
                Local-first Sync <span class="w-1 h-1 bg-secondary-fixed-dim rounded-full inline-block"></span> End-to-End Encrypted
            </p>
</div>
<!-- Authentication Container -->
<div class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-lg flex flex-col gap-lg shadow-none">
<!-- Biometric Option (Primary OS Style) -->
<button class="w-full group relative overflow-hidden bg-primary-fixed-dim text-on-primary-container font-label-mono text-label-mono py-md rounded-lg flex flex-col items-center justify-center gap-sm transition-all focus:outline-none focus:ring-1 focus:ring-primary-fixed-dim hover:brightness-110 active:scale-95 duration-100">
<span class="material-symbols-outlined text-[32px] group-hover:scale-110 transition-transform duration-300">
                    fingerprint
                </span>
<span>Unlock with Biometrics</span>
</button>
<!-- Divider -->
<div class="flex items-center w-full">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-md font-label-mono text-label-mono text-on-surface-variant">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Master Password Form -->
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-mono text-label-mono text-on-surface-variant flex items-center gap-xs" for="master-password">
<span class="material-symbols-outlined text-[16px]">key</span>
                        Master Password
                    </label>
<input autocomplete="current-password" class="w-full bg-surface text-on-surface font-code-block text-code-block px-sm py-sm border-b border-outline-variant focus:border-primary-fixed-dim focus:outline-none focus:ring-0 transition-colors placeholder-on-surface-variant/50" id="master-password" placeholder="••••••••••••••••" type="password"/>
</div>
<button class="w-full bg-transparent border border-outline-variant text-on-surface font-label-mono text-label-mono py-sm rounded flex items-center justify-center gap-sm hover:border-primary-fixed-dim focus:outline-none focus:ring-1 focus:ring-primary-fixed-dim transition-all active:scale-95 duration-100" type="button">
<span>Unlock Vault</span>
<span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Recovery / Info -->
<div class="mt-lg text-center">
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-primary-fixed-dim transition-colors flex items-center justify-center gap-xs" href="#">
<span class="material-symbols-outlined text-[14px]">help</span>
                Forgot Master Password?
            </a>
<p class="font-label-mono text-[10px] text-outline mt-sm max-w-xs mx-auto leading-relaxed">
                Vaults are zero-knowledge. We cannot recover your data if you lose your master password or biometric access.
            </p>
</div>
</main>
<!-- Suppressed Footer as this is a transactional screen -->
</body></html>
